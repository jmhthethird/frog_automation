name: CI

# ── Triggers ──────────────────────────────────────────────────────────────────
# Run on every pull-request that targets main.
# Also run on direct pushes to main so the release workflow can depend on this.
# Exposed as a reusable workflow so release.yml can call it before building.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Skip the version-bump commit pushed by the release bot.
    paths-ignore:
      - '**'  # overridden below by the commit-message filter
  workflow_call:  # called by release.yml

# Each event-type may fire a separate run; avoid redundant concurrent runs on
# the same ref by cancelling the older one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    # Skip when the release bot pushes the version-bump commit.
    # Always run when invoked via workflow_call (the caller handles filtering).
    if: >-
      ${{ github.event_name == 'workflow_call' ||
          !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Unit & route tests with coverage ─────────────────────────────────
      - name: Run Jest tests (unit + routes + integration)
        run: npm run test:coverage

      # ── Upload coverage report as an artifact ─────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── E2E UI tests ──────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'

      # ── Upload Playwright report on failure ───────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Screaming Frog integration tests (Linux) ────────────────────────────────────
  # Downloads, installs, and exercises the real SF binary end-to-end.
  # Screaming Frog runs in free mode (up to 500 URLs) without any licence, so
  # no repository secrets are needed.  The binary is installed unconditionally
  # and both Jest and Playwright SF tests run on every same-repo PR / push.
  sf-integration:
    name: SF integration tests (Linux)
    if: >-
      ${{ (github.event_name == 'workflow_call' ||
           !contains(github.event.head_commit.message, '[skip ci]')) &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Cache SF installer to avoid re-downloading on every run ──────────
      - name: Cache Screaming Frog installer
        id: cache-sf
        uses: actions/cache@v4
        with:
          path: /tmp/screamingfrogseospider_${{ env.SF_VERSION }}_all.deb
          key: sf-linux-${{ env.SF_VERSION }}
        env:
          SF_VERSION: '23.3'

      # ── Install Screaming Frog SEO Spider ─────────────────────────────────
      # The install script always accepts the EULA so the binary can run
      # headlessly.  Licence credentials are optional (free mode = 500 URLs).
      - name: Install Screaming Frog SEO Spider
        run: bash scripts/install-sf-linux.sh
        env:
          SF_VERSION: '23.3'
          SF_LICENSE_USERNAME: ${{ secrets.SF_LICENSE_USERNAME }}
          SF_LICENSE_KEY: ${{ secrets.SF_LICENSE_KEY }}

      # ── Run SF Jest integration tests ─────────────────────────────────────
      # RUN_SF_INTEGRATION=1 opts in to the otherwise-skipped crawl tests.
      # No licence secrets are needed – the free mode (500-URL limit) is
      # sufficient for all integration test crawls.
      - name: Run Screaming Frog integration tests (Jest)
        run: npx jest tests/integration/
        env:
          RUN_SF_INTEGRATION: '1'

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run SF Playwright e2e tests ───────────────────────────────────────
      # Crawls a local deterministic test-site fixture — no external network
      # access needed, making the job fast and reliable on every PR.
      - name: Run Screaming Frog E2E tests (Playwright)
        run: npm run test:e2e -- tests/e2e/sf-linux.spec.js
        env:
          CI: 'true'
          RUN_SF_INTEGRATION: '1'

      # ── Upload Playwright report on failure ───────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sf
          path: playwright-report/
          retention-days: 7

