name: PR Test Build

# Builds a test DMG when the "test-build" label is applied to a pull-request,
# and re-builds when the PR is updated while the label is still present.
# Publishes the result as a GitHub pre-release tagged  pr-{number}-preview
# so the Frog Automation "Install a PR build" feature can locate and install it.
#
# The pre-release is deleted automatically when the PR is closed or the
# "test-build" label is removed.

on:
  pull_request:
    types: [labeled, synchronize, closed, unlabeled]

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: build PR test DMG
    # Run only on PRs that currently carry the "test-build" label and that are
    # open.  The "synchronize" event fires on every new commit; we guard with
    # contains() so an unlabeled PR does not trigger a build on push.
    if: >-
      github.event.action != 'closed' &&
      github.event.action != 'unlabeled' &&
      contains(github.event.pull_request.labels.*.name, 'test-build')

    runs-on: macos-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app – Apple Silicon (arm64)
        run: npm run dist:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS app – Intel (x64)
        run: npm run dist:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / update PR preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}-preview
          name: "PR #${{ github.event.pull_request.number }} Test Build"
          prerelease: true
          draft: false
          body: |
            🧪 **Test build for PR #${{ github.event.pull_request.number }}**

            **PR:** ${{ github.event.pull_request.html_url }}
            **Branch:** `${{ github.head_ref }}`
            **Commit:** `${{ github.sha }}`

            > ⚠️ This is an unsigned test build for development purposes only.
            > It is not intended for production use.

            ### How to install
            1. In a running Frog Automation instance, click **↻ Updates** in the header.
            2. Expand **🧪 Install a PR build**.
            3. Paste the PR URL and click **Load**.
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comment with install instructions
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = `pr-${context.payload.pull_request.number}-preview`;
            const body = [
              `🧪 **Test build available!**`,
              ``,
              `A test DMG has been built for this PR. To install it locally:`,
              `1. Open a running Frog Automation instance.`,
              `2. Click **↻ Updates** in the header.`,
              `3. Expand **🧪 Install a PR build**.`,
              `4. Paste this PR URL and click **Load**: \`${context.payload.pull_request.html_url}\``,
              ``,
              `[View pre-release](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  # ── Cleanup ───────────────────────────────────────────────────────────────
  cleanup:
    name: delete PR preview release
    # Delete the pre-release when the PR is closed or the label is removed.
    if: >-
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' &&
       github.event.label.name == 'test-build')

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Delete PR preview release and tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `pr-${context.payload.pull_request.number}-preview`;

            // Find the release by tag.
            let releaseId;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                tag,
              });
              releaseId = data.id;
            } catch (err) {
              if (err.status === 404) {
                core.info(`No release found for tag ${tag} — nothing to clean up.`);
                return;
              }
              throw err;
            }

            // Delete the release first, then the tag.
            await github.rest.repos.deleteRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: releaseId,
            });
            core.info(`Deleted release for ${tag}`);

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `tags/${tag}`,
              });
              core.info(`Deleted tag ${tag}`);
            } catch (err) {
              if (err.status !== 422) throw err;
              core.info(`Tag ${tag} already deleted.`);
            }
